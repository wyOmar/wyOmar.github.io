<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>RegearRat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <img src="rat.png" alt="RegearRat Logo" style="max-width: 30%;">

    <form id="fileForm">
        <label for="file">Upload Loot Log:</label>
        <input type="file" id="file" name="file" accept=".txt" required>

        <label for="playerFilter">Username:</label>
        <input type="text" id="playerFilter" name="playerFilter" required>

        <button type="button" onclick="analyzeFile()">Check</button>
    </form>

    <div id="result"></div>

    <script src="script.js"></script>
</body>
</html>
